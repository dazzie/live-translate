# Fly.io config — Node gateway (the only service the browser touches)
# App name is set at create time; update `app` if you use a different name.
app = "fde-lt-gw-dm"
primary_region = "sjc"

[build]

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
